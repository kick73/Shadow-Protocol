<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SHADOW PROTOCOL: AUDIO ACTIVE</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; color: #0f0; }
        canvas { display: block; cursor: crosshair; }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: rgba(0,0,0,0.9); z-index: 100;
            text-align: center;
        }
        h1 { color: red; font-size: 5em; margin: 0; text-shadow: 0 0 20px #f00; }
        .score-text { color: gold; font-size: 2em; margin: 20px 0; }
        button {
            padding: 15px 40px; font-size: 1.5em; background: #111; color: #0f0;
            border: 2px solid #0f0; cursor: pointer; font-family: inherit; transition: 0.3s;
            margin: 10px;
        }
        button:hover { background: #0f0; color: #000; box-shadow: 0 0 20px #0f0; }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; text-shadow: 2px 2px #000; z-index: 10; display: none; }
        #weapon-ui { position: absolute; bottom: 20px; right: 20px; text-align: right; pointer-events: none; display: none; }
        #round-ui { position: absolute; bottom: 20px; left: 20px; color: red; font-size: 4em; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div id="mainMenu" class="overlay">
        <h1>SHADOW PROTOCOL</h1>
        <p style="color: #aaa; margin: 20px;">[WASD] Move | [R] Reload | [P] Pause | [Click] Fire</p>
        <button onclick="startGame()">START MISSION</button>
    </div>

    <div id="pauseMenu" class="overlay" style="display: none;">
        <h1 style="color: yellow;">PAUSED</h1>
        <button onclick="togglePause()">RESUME</button>
    </div>

    <div id="gameOverMenu" class="overlay" style="display: none;">
        <h1>MISSION FAILED</h1>
        <div class="score-text">ROUND REACHED: <span id="finalRound">0</span></div>
        <button onclick="restartGame()">REDEPLOY</button>
    </div>

    <div id="ui">
        <div id="mg-timer" style="color: #f0f; font-weight: bold; display:none;">MINIGUN ACTIVE!</div>
        <div>POINTS: <span id="points" style="color: gold;">500</span></div>
        <div>HEALTH: <span id="hp" style="color: red;">❤❤❤</span></div>
    </div>

    <div id="round-ui">1</div>

    <div id="weapon-ui">
        <div id="w-name" style="font-size: 1.5em;">M1911</div>
        <div style="font-size: 3em;"><span id="ammo-cur">7</span>/<span id="ammo-max">7</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- AUDIO ENGINE ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, type, duration, vol=0.1) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function sfxShoot() { playSound(150, 'sawtooth', 0.1, 0.05); }
function sfxReload() { playSound(800, 'square', 0.1, 0.05); }
function sfxHit() { playSound(100, 'sine', 0.3, 0.2); }
function sfxDeath() { 
    playSound(200, 'sawtooth', 1, 0.2); 
    setTimeout(() => playSound(150, 'sawtooth', 1, 0.2), 200);
}

// --- ASSETS ---
const assets = { player: new Image(), zombie: new Image(), fuel: new Image(), ammo: new Image(), bench: new Image(), box: new Image() };
assets.player.src = 'player.png';
assets.zombie.src = 'zombie.png';
assets.fuel.src = 'fuel.png';
assets.ammo.src = 'ammo.png';
assets.bench.src = 'workbench.png';
assets.box.src = 'generator.png';

const WEAPONS = { 'M1911': { mags: [7, 10, 15], dmg: 2 } };
let gameActive = false, paused = false, player, entities, round, bullets, keys;

function initStats() {
    player = { x: 0, y: 0, hp: 3, points: 500, weapon: 'M1911', tier: 0, ammo: 7, speed: 4, angle: 0, minigunTime: 0, isReloading: false, reloadProgress: 0, lastFire: 0 };
    entities = [{ type: 'box', x: 250, y: -250 }, { type: 'bench', x: -250, y: -250 }];
    round = 1; bullets = []; keys = {};
}

window.onkeydown = (e) => { keys[e.code] = true; if(e.code === 'KeyP' || e.code === 'Escape') togglePause(); if(e.code === 'KeyR') startReload(); };
window.onkeyup = (e) => keys[e.code] = false;
window.onmousemove = (e) => player.angle = Math.atan2(e.clientY - canvas.height/2, e.clientX - canvas.width/2);
window.onmousedown = () => { if(gameActive && !paused) fire(); };

function startGame() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    initStats();
    document.getElementById('mainMenu').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    document.getElementById('weapon-ui').style.display = 'block';
    document.getElementById('round-ui').style.display = 'block';
    gameActive = true;
    spawnWave();
    requestAnimationFrame(update);
}

function restartGame() {
    document.getElementById('gameOverMenu').style.display = 'none';
    startGame();
}

function togglePause() { if(!gameActive || player.hp <= 0) return; paused = !paused; document.getElementById('pauseMenu').style.display = paused ? 'flex' : 'none'; }

function startReload() { if (player.isReloading || player.minigunTime > 0) return; player.isReloading = true; player.reloadProgress = 0; }

function fire() {
    if (player.isReloading || (player.ammo <= 0 && player.minigunTime <= 0)) return;
    let now = Date.now();
    if (now - player.lastFire < 150) return;
    player.lastFire = now;
    sfxShoot();
    let isMG = player.minigunTime > 0;
    if(!isMG) player.ammo--;
    bullets.push({ x: player.x, y: player.y, vx: Math.cos(player.angle)*20, vy: Math.sin(player.angle)*20, dmg: isMG ? 6 : 2, life: 60, isMG });
}

function spawnWave() {
    for(let i=0; i<5+round*2; i++) {
        let a = Math.random()*Math.PI*2;
        entities.push({type:'zombie', x:player.x+Math.cos(a)*800, y:player.y+Math.sin(a)*800, hp:10+round*5});
    }
}

function update() {
    if (!gameActive || paused) return;
    if (player.hp <= 0) {
        sfxDeath();
        gameActive = false;
        document.getElementById('gameOverMenu').style.display = 'flex';
        document.getElementById('finalRound').innerText = round;
        return;
    }

    if (keys['KeyW']) player.y -= player.speed; if (keys['KeyS']) player.y += player.speed;
    if (keys['KeyA']) player.x -= player.speed; if (keys['KeyD']) player.x += player.speed;

    if (player.isReloading) {
        player.reloadProgress += 1.5;
        if (player.reloadProgress >= 100) {
            player.ammo = WEAPONS[player.weapon].mags[player.tier];
            player.isReloading = false;
            sfxReload();
        }
    }

    entities.forEach(e => {
        if (e.type === 'zombie') {
            let dx = player.x-e.x, dy = player.y-e.y, d = Math.sqrt(dx*dx+dy*dy);
            e.x += (dx/d)*(1.5+round*0.1); e.y += (dy/d)*(1.5+round*0.1);
            if(d < 35 && Date.now()%900 < 20) { player.hp--; sfxHit(); }
        }
    });

    bullets.forEach(b => {
        b.x += b.vx; b.y += b.vy; b.life--;
        entities.forEach(e => {
            if(e.type==='zombie' && Math.sqrt((b.x-e.x)**2+(b.y-e.y)**2)<30) {
                e.hp -= b.dmg; b.life = 0;
                if(e.hp <= 0 && !e.dead) { e.dead = true; player.points += 100; }
            }
        });
    });

    entities = entities.filter(e => !e.dead);
    bullets = bullets.filter(b => b.life > 0);
    if(entities.filter(e=>e.type==='zombie').length === 0) { round++; spawnWave(); }
    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.fillStyle = '#050505'; ctx.fillRect(0,0,canvas.width,canvas.height);
    let cx = player.x - canvas.width/2, cy = player.y - canvas.height/2;
    entities.forEach(e => {
        let img = assets[e.type];
        if(img && img.complete) ctx.drawImage(img, e.x-cx-25, e.y-cy-25, 50, 50);
    });
    bullets.forEach(b => { ctx.fillStyle = b.isMG ? '#f0f' : '#fff'; ctx.fillRect(b.x-cx, b.y-cy, 5, 5); });
    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.rotate(player.angle);
    if(assets.player.complete) ctx.drawImage(assets.player, -30, -30, 60, 60);
    ctx.restore();
    if(player.isReloading) {
        ctx.fillStyle = '#444'; ctx.fillRect(canvas.width/2-25, canvas.height/2-50, 50, 6);
        ctx.fillStyle = '#0f0'; ctx.fillRect(canvas.width/2-25, canvas.height/2-50, (player.reloadProgress/100)*50, 6);
    }
    document.getElementById('points').innerText = player.points;
    document.getElementById('hp').innerText = '❤'.repeat(player.hp);
    document.getElementById('round-ui').innerText = round;
    document.getElementById('ammo-cur').innerText = player.ammo;
}
</script>
</body>
</html>
